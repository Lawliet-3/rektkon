services:
  api:
    image: python:3.12-slim
    working_dir: /app
    volumes:
      - ./:/app
    command: >
      sh -c "pip install --no-cache-dir -r requirements.txt && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    environment:
      MLFLOW_TRACKING_URI: http://mlflow:5000
      MLFLOW_MODEL_NAME: volatility-model
      INFERENCE_LOG_DB_PATH: /app/data/inference_payloads.db
    ports:
      - "8000:8000"
    depends_on:
      - mlflow

  mlflow:
    image: ghcr.io/mlflow/mlflow:v3.1.1
    command: mlflow server --host 0.0.0.0 --port 5000
    ports:
      - "5000:5000"

  monitor-worker:
    image: python:3.12-slim
    working_dir: /app
    volumes:
      - ./:/app
    command: >
      sh -c "pip install --no-cache-dir -r requirements.txt && while true; do python validate_data.py || true; python monitor_drift.py || true; sleep ${MONITOR_INTERVAL_SECONDS:-3600}; done"
    environment:
      INFERENCE_LOG_DB_PATH: /app/data/inference_payloads.db
      DRIFT_REPORT_DIR: /app/reports
    depends_on:
      - api

  prometheus:
    image: prom/prometheus:v3.4.2
    command:
      - --config.file=/etc/prometheus/prometheus.yml
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    depends_on:
      - api

  grafana:
    image: grafana/grafana:12.0.1
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
